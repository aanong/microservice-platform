version: "3.8"

services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: infra-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      TZ: Asia/Shanghai
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --default-time-zone=+08:00
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/conf/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - mall-net

  redis:
    image: docker.m.daocloud.io/library/redis:7.2
    container_name: infra-redis
    restart: always
    command: redis-server --appendonly yes --requirepass '$NMQ#vqc'
    ports:
      - "30379:6379"
    volumes:
      - ./redis/data:/data
    networks:
      - mall-net

  nacos:
    image: docker.m.daocloud.io/nacos/nacos-server:v2.2.3
    container_name: infra-nacos
    restart: always
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      PREFER_HOST_MODE: hostname
      TZ: Asia/Shanghai
    ports:
      - "30048:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - ./nacos/logs:/home/nacos/logs
      - ./nacos/data:/home/nacos/data
    networks:
      - mall-net

  namesrv:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/apache/rocketmq:5.1.4
    container_name: rmq-namesrv
    command: sh mqnamesrv
    restart: always
    ports:
      - "9876:9876"
    networks:
      - mall-net

  broker:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/apache/rocketmq:5.1.4
    container_name: rmq-broker
    depends_on:
      - namesrv
    restart: always
    environment:
      - NAMESRV_ADDR=namesrv:9876
    command: sh mqbroker -n namesrv:9876 -c /home/rocketmq/conf/broker.conf
    ports:
      - "10911:10911"
      - "10909:10909"
      - "10912:10912"
    volumes:
      - ./rocketmq/conf/broker.conf:/home/rocketmq/conf/broker.conf
      - ./rocketmq/data/store:/home/rocketmq/store
      - ./rocketmq/data/logs:/home/rocketmq/logs
    networks:
      - mall-net

  dashboard:
    image: docker.m.daocloud.io/apacherocketmq/rocketmq-dashboard:2.0.0
    container_name: rmq-dashboard
    depends_on:
      - namesrv
    restart: always
    environment:
      - JAVA_OPTS=-Drocketmq.namesrv.addr=namesrv:9876
    ports:
      - "8080:8080"
    networks:
      - mall-net

  seata-server:
    image: docker.m.daocloud.io/seataio/seata-server:1.6.1
    container_name: seata-server
    restart: always
    environment:
      - SEATA_CONFIG_NAME=file:/root/seata-config/registry
      - TZ=Asia/Shanghai
    ports:
      - "8091:8091"
    volumes:
      - ./seata/conf:/root/seata-config
      - ./seata/logs:/root/logs
    networks:
      - mall-net

  canal-server:
    image: docker.m.daocloud.io/canal/canal-server:v1.1.7
    container_name: canal-server
    depends_on:
      - mysql
      - namesrv
      - broker
    restart: always
    ports:
      - "11111:11111"
      - "11112:11112"
    volumes:
      - ./canal/conf:/home/admin/canal-server/conf
      - ./canal/logs:/home/admin/canal-server/logs
    networks:
      - mall-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - TZ=Asia/Shanghai
    ports:
      - "9200:9200"
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
    networks:
      - mall-net

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    depends_on:
      - elasticsearch
    restart: always
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - mall-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    depends_on:
      - elasticsearch
    restart: always
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - I18N_LOCALE=zh-CN
      - TZ=Asia/Shanghai
    ports:
      - "5601:5601"
    networks:
      - mall-net

  skywalking-oap:
    image: apache/skywalking-oap-server:10.1.0
    container_name: skywalking-oap
    depends_on:
      - elasticsearch
    restart: always
    environment:
      - SW_STORAGE=elasticsearch
      - SW_STORAGE_ES_CLUSTER_NODES=elasticsearch:9200
      - TZ=Asia/Shanghai
    ports:
      - "11800:11800"
      - "12800:12800"
    networks:
      - mall-net

  skywalking-ui:
    image: apache/skywalking-ui:10.1.0
    container_name: skywalking-ui
    depends_on:
      - skywalking-oap
    restart: always
    environment:
      - SW_OAP_ADDRESS=http://skywalking-oap:12800
      - TZ=Asia/Shanghai
    ports:
      - "8088:8080"
    networks:
      - mall-net

networks:
  mall-net:
    driver: bridge
