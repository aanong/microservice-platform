input {
  file {
    path => "/var/lib/docker/containers/*/*.log"
    start_position => "beginning"
    sincedb_path => "/tmp/logstash-containers.sincedb"
    codec => json
  }
}

filter {
  if [log] and [log] =~ "^{.*}$" {
    json {
      source => "log"
      target => "app"
      skip_on_invalid_json => true
    }
  }

  if [app][timestamp] {
    date {
      match => [ "[app][timestamp]", "ISO8601" ]
      target => "@timestamp"
    }
  }

  if [app][service.name] {
    mutate {
      add_field => { "service.name" => "%{[app][service.name]}" }
    }
  } else if [app][serviceName] {
    mutate {
      add_field => { "service.name" => "%{[app][serviceName]}" }
    }
  }

  if [container_name] {
    mutate {
      add_field => { "docker.container_name" => "%{[container_name]}" }
    }
  }
}

output {
  elasticsearch {
    hosts => [ "http://elasticsearch:9200" ]
    index => "microservice-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
